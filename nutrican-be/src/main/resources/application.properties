spring.application.name=nutrican-pt-api
spring.profiles.active=dev

# Load .env file as Spring properties — app will NOT start without .env
spring.config.import=file:.env[.properties]

# Database — REQUIRED: DATASOURCE_URL, POSTGRES_USER, POSTGRES_PASSWORD in .env
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server — REQUIRED: SERVER_PORT in .env
server.port=${SERVER_PORT}

# MinIO — REQUIRED: MINIO_URL, MINIO_ROOT_USER, MINIO_ROOT_PASSWORD, MINIO_BUCKET_NAME in .env
minio.url=${MINIO_URL}
minio.access-key=${MINIO_ROOT_USER}
minio.secret-key=${MINIO_ROOT_PASSWORD}
minio.bucket-name=${MINIO_BUCKET_NAME}

# Ollama AI — REQUIRED: OLLAMA_URL, OLLAMA_MODEL in .env
ai.ollama.base-url=${OLLAMA_URL}
ai.ollama.default-model=${OLLAMA_MODEL}
ai.ollama.meal-analysis.enabled=true
ai.ollama.meal-analysis.model=${OLLAMA_MEAL_MODEL}
ai.ollama.meal-analysis.timeout-seconds=120

# ResNet AI — REQUIRED: AI_RESNET_URL in .env
ai.resnet.base-url=${AI_RESNET_URL}
ai.resnet.enabled=true
ai.resnet.confidence-threshold=0.25
ai.recognition.confidence-threshold=0.25

# Security — REQUIRED: JWT_SECRET_KEY, JWT_EXPIRATION_MS in .env
app.security.jwt.secret-key=${JWT_SECRET_KEY}
app.security.jwt.expiration=${JWT_EXPIRATION_MS}

# CORS — REQUIRED: CORS_ALLOWED_ORIGINS in .env (e.g. http://localhost:5173,http://localhost:3000)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Firebase — REQUIRED: FIREBASE_CREDENTIALS_PATH, FIREBASE_ENABLED in .env
app.firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH}
app.firebase.enabled=${FIREBASE_ENABLED}

# VNPT eKYC — REQUIRED: VNPT_EKYC_BASE_URL, VNPT_EKYC_ACCESS_TOKEN, VNPT_EKYC_TOKEN_ID, VNPT_EKYC_TOKEN_KEY in .env
vnpt.ekyc.base-url=${VNPT_EKYC_BASE_URL}
vnpt.ekyc.access-token=${VNPT_EKYC_ACCESS_TOKEN}
vnpt.ekyc.token-id=${VNPT_EKYC_TOKEN_ID}
vnpt.ekyc.token-key=${VNPT_EKYC_TOKEN_KEY}

# Mail (SMTP) — REQUIRED: MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD in .env
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.default-encoding=UTF-8

# Frontend URL — used in email reset links
app.frontend.url=${FRONTEND_URL}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

#logging.level.org.springframework.web=DEBUG
#logging.level.org.springframework.security=DEBUG
#logging.level.org.springdoc=DEBUG

# Redis - Rate Limiting
spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT}