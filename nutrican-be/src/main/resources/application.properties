spring.application.name=nutrican-pt-api
spring.profiles.active=dev

spring.config.import=file:.env[.properties]

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT}

minio.url=${MINIO_URL}
minio.access-key=${MINIO_ROOT_USER}
minio.secret-key=${MINIO_ROOT_PASSWORD}
minio.bucket-name=${MINIO_BUCKET_NAME}

ai.ollama.base-url=${OLLAMA_URL}
ai.ollama.default-model=${OLLAMA_MODEL}
ai.ollama.meal-analysis.enabled=true
ai.ollama.meal-analysis.model=${OLLAMA_MEAL_MODEL}
ai.ollama.meal-analysis.timeout-seconds=120

ai.resnet.base-url=${AI_RESNET_URL}
ai.resnet.enabled=true
ai.resnet.class-profile=resnet_unified
ai.resnet.confidence-threshold=0.25
ai.gate.min-food-confidence=0.12
ai.recognition.confidence-threshold=0.90
ai.recognition.auto-accept-reliability=0.90

app.security.jwt.secret-key=${JWT_SECRET_KEY}
app.security.jwt.expiration=${JWT_EXPIRATION_MS}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

app.firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH}
app.firebase.enabled=${FIREBASE_ENABLED}

vnpt.ekyc.base-url=${VNPT_EKYC_BASE_URL}
vnpt.ekyc.access-token=${VNPT_EKYC_ACCESS_TOKEN}
vnpt.ekyc.token-id=${VNPT_EKYC_TOKEN_ID}
vnpt.ekyc.token-key=${VNPT_EKYC_TOKEN_KEY}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.default-encoding=UTF-8

app.frontend.url=${FRONTEND_URL}

# Coaching payment / escrow
app.payment.platform-fee-rate=${COACHING_PLATFORM_FEE_RATE}
app.payment.accepted-request-hours=${COACHING_PAYMENT_WINDOW_HOURS}
vnpay.tmnCode=${VNPAY_TMN_CODE}
vnpay.hashSecret=${VNPAY_HASH_SECRET}
vnpay.payUrl=${VNPAY_PAY_URL}
vnpay.returnUrl=${VNPAY_RETURN_URL}
vnpay.ipnUrl=${VNPAY_IPN_URL:}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

#logging.level.org.springframework.web=DEBUG
#logging.level.org.springframework.security=DEBUG
#logging.level.org.springdoc=DEBUG

# Redis - Rate Limiting
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
# Disable global IP rate limit on localhost (E2E / local dev); set true in production
nutrican.rate-limit.enabled=${NUTRICAN_RATE_LIMIT_ENABLED:false}
nutrican.rate-limit.global-per-minute=${NUTRICAN_RATE_LIMIT_GLOBAL_PER_MINUTE:100}
