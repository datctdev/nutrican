# Tên ứng dụng
spring.application.name=nutrican-pt-api

# ---------------------------------------------------------
# CẤU HÌNH ĐỌC FILE .ENV (Bắt buộc phải có dòng này)
# ---------------------------------------------------------
spring.config.import=optional:file:.env

# ---------------------------------------------------------
# DATABASE & JPA
# ---------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------
# SERVER
# ---------------------------------------------------------
server.port=${SERVER_PORT:8080}

# ---------------------------------------------------------
# MINIO CONFIGURATION
# ---------------------------------------------------------
minio.url=http://localhost:${MINIO_API_PORT:9000}
minio.access-key=${MINIO_ROOT_USER}
minio.secret-key=${MINIO_ROOT_PASSWORD}
minio.bucket-name=${MINIO_BUCKET_NAME}

# ---------------------------------------------------------
# AI GATEWAY CONFIGURATION (Ollama Local)
# ---------------------------------------------------------
ai.ollama.base-url=http://localhost:${OLLAMA_PORT:11434}
ai.ollama.default-model=qwen2.5-vl

# ---------------------------------------------------------
# JWT SECURITY CONFIGURATION
# ---------------------------------------------------------
app.security.jwt.secret-key=${JWT_SECRET_KEY}
app.security.jwt.expiration=${JWT_EXPIRATION_MS}

# ---------------------------------------------------------
# FILE UPLOAD CONFIGURATION
# ---------------------------------------------------------
spring.servlet.multipart.max-file-size=500KB
spring.servlet.multipart.max-request-size=10MB
